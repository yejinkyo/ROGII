model: lstm
n_splits: 5
seq_len: 64
stride: 8          # 학습 시 stride (메모리 절약)
pred_stride: 1     # 예측 시 stride (정확도 우선)
batch_size: 256
epochs: 100
early_stopping_patience: 15
reduce_lr_patience: 7
reduce_lr_factor: 0.5

architecture:
  lstm1_units: 128
  lstm2_units: 64
  dropout: 0.2
  dense_units: 32
